<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark">
    
    <title>Finova – Intelligence Portal</title>

    <link rel="icon" type="image/png" href="/finova.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link 
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" 
      rel="stylesheet"
    />

    <style>
      /* 🟢 FIX 3: Background color ab flexible hai */
      html {
        -webkit-font-smoothing: antialiased;
        scroll-behavior: smooth;
      }

      /* 🟢 FIX 4: Default background ko neutral rakha taaki context load hone tak wait kare */
      body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background-color: #ffffff; /* Default light */
      }

      /* Dark mode overrides (for that initial reload flash) */
      html.dark body {
        background-color: #020617;
      }
      
      /* 💎 Scrollbar logic */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { 
        background: #1e293b; 
        border-radius: 10px; 
        border: 1px solid rgba(255,255,255,0.05);
      }
      ::-webkit-scrollbar-thumb:hover { background: #6366f1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
